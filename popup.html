<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 300px;
        font-family: "Microsoft JhengHei", sans-serif;
        padding: 12px;
        background: #1a1a1a;
        color: #fff;
      }

      h2 {
        font-size: 14px;
        margin-bottom: 12px;
        color: #ff6b6b;
      }

      label {
        font-size: 12px;
        display: block;
        margin-top: 10px;
        color: #ccc;
      }

      input[type="range"] {
        width: 100%;
      }

      input[type="color"] {
        width: 48%;
        height: 30px;
      }

      select {
        width: 100%;
        padding: 4px;
        background: #333;
        color: #fff;
        border: 1px solid #555;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }

      .preview {
        position: relative;
        background: #000;
        padding: 12px;
        border-radius: 6px;
        margin-top: 12px;
        min-height: 180px;
        overflow: hidden;
      }

      #preview-box {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .preview-text {
        font-size: 24px;
        color: white;
        background: rgba(0, 0, 0, 0.75);
        padding: 2px 8px;
        border-radius: 4px;
        text-align: center;
      }

      .toggle {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      input[type="checkbox"] {
        transform: scale(1.4);
      }

      span.val {
        color: #ff6b6b;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h2>YT Shorts 雙字幕增強器</h2>

    <div class="toggle">
      <label for="enabled">啟用字幕增強</label>
      <input type="checkbox" id="enabled" checked />
    </div>

    <label for="fontSize">字幕大小: <span class="val" id="fontSizeVal">24px</span></label>
    <input type="range" id="fontSize" min="12" max="56" value="24" />

    <label for="fontWeight">字體粗細</label>
    <select id="fontWeight">
      <option value="400">Regular</option>
      <option value="600">Semi-Bold</option>
      <option value="700" selected>Bold</option>
      <option value="900">Black</option>
    </select>

    <label for="fontFamily">字體</label>
    <select id="fontFamily">
      <option value="inherit">預設</option>
      <option value="Arial, sans-serif">Arial</option>
      <option value="'Noto Sans TC', sans-serif">Noto Sans TC</option>
      <option value="'Microsoft JhengHei', sans-serif">微軟正黑體</option>
    </select>

    <label for="color">字幕顏色 / 背景色</label>
    <div class="row">
      <input type="color" id="color" value="#ffffff" />
      <input type="color" id="bgColor" value="#000000" />
    </div>

    <label for="bgOpacity">背景透明度: <span class="val" id="bgOpacityVal">75%</span></label>
    <input type="range" id="bgOpacity" min="0" max="100" value="75" />

    <label for="bottomOffset">垂直位移(px): <span class="val" id="bottomOffsetVal">0px</span></label>
    <input type="range" id="bottomOffset" min="-600" max="700" value="0" />

    <div class="preview">
      <div id="preview-box">
        <span id="preview-source" class="preview-text">alone. Oh my god, he s so sad</span>
        <span id="preview-target" class="preview-text">獨自一人。天啊，他看起來好難過。</span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
